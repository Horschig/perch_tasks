name: Publish Release Assets

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref or SHA to publish from
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: publish-release-assets-main
  cancel-in-progress: false

env:
  RELEASE_REF: ${{ inputs.release_ref || 'main' }}

jobs:
  prepare-release:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      release_sha: ${{ steps.release_meta.outputs.release_sha }}
      version: ${{ steps.release_meta.outputs.version }}
      tag_name: ${{ steps.release_meta.outputs.tag_name }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_REF }}

      - name: Read release metadata
        id: release_meta
        run: |
          release_sha=$(git rev-parse HEAD)
          version=$(python3 -c "import json; print(json.load(open('package.json', encoding='utf-8'))['version'])")
          echo "release_sha=$release_sha" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$version" >> "$GITHUB_OUTPUT"

      - name: Extract latest changelog section
        run: |
          python3 - <<'PY'
          from pathlib import Path

          changelog_path = Path('CHANGELOG.md')
          lines = changelog_path.read_text(encoding='utf-8').splitlines()
          start = next((index for index, line in enumerate(lines) if line.startswith('## ')), None)

          if start is None:
            fallback = changelog_path.read_text(encoding='utf-8').strip()
            if fallback.startswith('# Changelog'):
              fallback = fallback[len('# Changelog'):].strip()

            if not fallback:
              raise SystemExit('No release notes found in CHANGELOG.md')

            latest = fallback
          else:
            end = next(
              (index for index in range(start + 1, len(lines)) if lines[index].startswith('## ')),
              len(lines),
            )
            latest = '\n'.join(lines[start:end]).strip()

          Path('latest-release-notes.md').write_text(f'{latest}\n', encoding='utf-8')
          PY
          test -s latest-release-notes.md

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-notes-${{ steps.release_meta.outputs.version }}
          path: latest-release-notes.md
          if-no-files-found: error

  build-windows:
    name: Build Windows Release
    needs: prepare-release
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build Windows bundles
        run: npm run app:build

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-windows-${{ needs.prepare-release.outputs.version }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-linux:
    name: Build Linux Release
    needs: prepare-release
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build Linux bundles
        run: npm run app:build -- --bundles appimage,deb

      - name: Upload Linux build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-linux-${{ needs.prepare-release.outputs.version }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - prepare-release
      - build-windows
      - build-linux
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare-release.outputs.release_sha }}

      - name: Download Windows artifact
        uses: actions/download-artifact@v7
        with:
          name: release-windows-${{ needs.prepare-release.outputs.version }}
          path: release-assets/windows

      - name: Download Linux artifact
        uses: actions/download-artifact@v7
        with:
          name: release-linux-${{ needs.prepare-release.outputs.version }}
          path: release-assets/linux

      - name: Download release notes artifact
        uses: actions/download-artifact@v7
        with:
          name: release-notes-${{ needs.prepare-release.outputs.version }}
          path: release-assets/notes

      - name: Create and push release tag
        env:
          TAG_NAME: ${{ needs.prepare-release.outputs.tag_name }}
        run: |
          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            existing_target=$(git rev-list -n 1 "$TAG_NAME")
            current_target=$(git rev-parse HEAD)

            if [ "$existing_target" != "$current_target" ]; then
              echo "Tag $TAG_NAME already exists on $existing_target, expected $current_target." >&2
              exit 1
            fi

            echo "Tag $TAG_NAME already exists on the current release commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG_NAME" -m "Perch Tasks $TAG_NAME"
          git push origin "$TAG_NAME"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag_name }}
          name: Perch Tasks ${{ needs.prepare-release.outputs.tag_name }}
          body_path: release-assets/notes/latest-release-notes.md
          files: |
            release-assets/windows/**/*.msi
            release-assets/windows/**/*.exe
            release-assets/linux/**/*.AppImage
            release-assets/linux/**/*.deb