name: PR Validation

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  merge_group:
    types:
      - checks_requested

permissions:
  contents: read

concurrency:
  group: pr-validation-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run browser regression tests
        run: npm run test:browser

      - name: Run Svelte and TypeScript checks
        run: npm run check

      - name: Build frontend
        run: npm run build

  windows-desktop-build:
    name: Windows Desktop Build
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri bundle
        shell: pwsh
        run: npm run app:build

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v7
        with:
          name: perch-tasks-windows-bundle-${{ github.run_id }}
          path: |
            src-tauri/target/release/bundle/**
            !src-tauri/target/release/bundle/**/*.pdb
          if-no-files-found: error
          compression-level: 0

  linux-desktop-build:
    name: Linux Desktop Build
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: stable

      - name: Install npm dependencies
        run: npm ci

      - name: Build Linux bundles
        run: npm run app:build -- --bundles appimage,deb

      - name: Upload Linux bundle artifacts
        uses: actions/upload-artifact@v7
        with:
          name: perch-tasks-linux-bundle-${{ github.run_id }}
          path: |
            src-tauri/target/release/bundle/appimage/**
            src-tauri/target/release/bundle/deb/**
          if-no-files-found: error
          compression-level: 0